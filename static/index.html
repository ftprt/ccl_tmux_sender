<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ccl_tmux_sender</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header h1 { font-size: 22px; font-weight: 600; }
  header .refresh-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 3px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 17px;
  }
  header .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Two-column layout */
  .main { flex: 1; display: flex; overflow: hidden; }
  .left-panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .right-panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Pane cards */
  .panes-section { padding: 12px 16px; flex-shrink: 0; }
  .panes-section h2 { font-size: 15px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .pane-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pane-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .pane-card:hover { border-color: var(--accent); }
  .pane-card.selected { border-color: var(--accent); background: #1a2332; }
  .pane-card .target { font-family: monospace; font-size: 18px; font-weight: 600; }
  .pane-card .cwd { font-size: 15px; color: var(--text-dim); margin-top: 2px; word-break: break-all; }
  .pane-card .meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .status-dot.idle { background: var(--green); }
  .status-dot.busy { background: var(--yellow); }
  .status-dot.unknown { background: var(--text-dim); }
  .status-label { font-size: 15px; color: var(--text-dim); }
  .prompt-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--yellow);
    border: 1px solid var(--yellow);
    border-radius: 4px;
    padding: 0 5px;
    line-height: 18px;
  }
  .prompt-badge.animate {
    animation: prompt-badge-pulse 2s ease-in-out 3;
  }
  @keyframes prompt-badge-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .pane-card .token-info {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: "Consolas", "Monaco", monospace;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pane-card .token-info .ctx-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .pane-card .token-info .ctx-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* Prompt section */
  .prompt-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 16px 12px;
    overflow: hidden;
  }
  .prompt-section .selected-target {
    font-size: 17px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .prompt-section .selected-target strong { color: var(--accent); font-family: monospace; }
  .options-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .option-group { display: flex; align-items: center; gap: 6px; }
  .option-group-label { font-size: 15px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px; margin-right: 2px; }
  .radio-label, .checkbox-label {
    display: flex; align-items: center; gap: 4px;
    font-size: 17px; color: var(--text); cursor: pointer;
    padding: 3px 6px; border-radius: 4px;
    border: 1px solid transparent; transition: border-color 0.15s;
  }
  .radio-label:hover, .checkbox-label:hover { border-color: var(--border); }
  .radio-label input, .checkbox-label input { accent-color: var(--accent); cursor: pointer; }
  .options-divider { width: 1px; height: 18px; background: var(--border); }

  .quick-buttons {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .quick-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: "Consolas", "Monaco", monospace;
    font-size: 14px;
    transition: border-color 0.15s, color 0.15s;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--accent); }
  .quick-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .prompt-row { position: relative; flex: 1; min-height: 0; }
  .prompt-row textarea {
    width: 100%;
    height: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 10px 12px 40px 12px;
    font-family: "Consolas", "Monaco", monospace;
    font-size: 18px;
    resize: none;
  }
  .prompt-row textarea:focus { outline: none; border-color: var(--accent); }
  .prompt-row textarea::placeholder { color: var(--text-dim); }
  .send-btn {
    position: absolute;
    right: 8px;
    bottom: 8px;
    background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 5px 14px; font-size: 16px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }
  .send-btn:hover { filter: brightness(1.1); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn.sent { background: var(--green); }
  .send-btn.failed { background: var(--red); }

  /* Pane preview */
  .preview-header {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .preview-header .auto-scroll-label {
    margin-left: auto;
    text-transform: none;
    letter-spacing: 0;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 15px;
    cursor: pointer;
  }
  .preview-header .auto-scroll-label input { accent-color: var(--accent); cursor: pointer; }
  .preview-content {
    flex: 1;
    display: flex;
    padding: 8px 12px;
    background: #000;
    min-height: 0;
  }
  .preview-content textarea {
    flex: 1;
    font-family: "Consolas", "Monaco", "Courier New", monospace;
    font-size: 17px;
    line-height: 1.4;
    color: var(--text);
    background: #000;
    border: none;
    resize: none;
    outline: none;
    white-space: pre;
    overflow: auto;
  }
  .preview-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    color: var(--text-dim);
    font-size: 18px;
  }



  .empty-state { text-align: center; padding: 24px; color: var(--text-dim); font-size: 18px; }

  /* Prompt action bar */
  .prompt-actions {
    background: var(--surface);
    border: 2px solid var(--yellow);
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 8px;
    flex-shrink: 0;
    animation: pulse-border 2s ease-in-out 3;
  }
  @keyframes pulse-border {
    0%, 100% { border-color: var(--yellow); }
    50% { border-color: var(--accent); }
  }
  .prompt-actions-label {
    font-size: 13px;
    color: var(--yellow);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .prompt-actions-buttons {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 140px;
    overflow-y: auto;
  }
  .prompt-action-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: left;
    flex-shrink: 0;
  }
  .prompt-action-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: #1a2332;
  }
  .prompt-action-btn.positive { border-color: var(--green); color: var(--green); }
  .prompt-action-btn.positive:hover { background: #1a2a1a; }
  .prompt-action-btn.negative { border-color: var(--red); color: var(--red); }
  .prompt-action-btn.negative:hover { background: #2a1a1a; }
  .prompt-action-btn .shortcut {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 6px;
    opacity: 0.7;
  }
  .prompt-actions-dismiss {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
  }
  .prompt-actions-dismiss:hover { color: var(--text); }

  /* Manual response buttons */
  .manual-keys { display: flex; gap: 4px; }
  .manual-keys .quick-btn { min-width: 32px; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>claude_tmux_sender</h1>
  <button class="refresh-btn" onclick="loadPanes()">Refresh</button>
</header>

<div class="main">
  <!-- Left: pane selection + prompt input -->
  <div class="left-panel">
    <section class="panes-section">
      <h2>Panes</h2>
      <div id="pane-grid" class="pane-grid">
        <div class="empty-state">Loading...</div>
      </div>
    </section>

    <section class="prompt-section">
      <div class="selected-target" id="selected-label">Select a pane above</div>
      <div class="options-row">
        <div class="option-group">
          <span class="option-group-label">Mode</span>
          <label class="radio-label"><input type="radio" name="mode" value="normal" checked>Normal</label>
          <label class="radio-label"><input type="radio" name="mode" value="plan">Plan</label>
        </div>
        <div class="options-divider"></div>
        <div class="option-group">
          <label class="checkbox-label"><input type="checkbox" id="send-enter" checked>Send Enter</label>
        </div>
      </div>
      <div class="quick-buttons" id="quick-buttons">
        <button class="quick-btn" onclick="quickSend('/clear')" disabled>/clear</button>
        <button class="quick-btn" onclick="quickSend('/compact')" disabled>/compact</button>
        <div class="options-divider"></div>
        <div class="manual-keys" id="manual-keys">
          <!-- button class="quick-btn" onclick="sendRawKeys(['y'])" disabled>y</button>
          <button class="quick-btn" onclick="sendRawKeys(['n'])" disabled>n</button -->
          <button class="quick-btn" onclick="sendRawKeys(['Escape'])" disabled>Esc</button>
          <button class="quick-btn" onclick="sendRawKeys(['Up'])" disabled>&uarr;</button>
          <button class="quick-btn" onclick="sendRawKeys(['Down'])" disabled>&darr;</button>
          <button class="quick-btn" onclick="sendRawKeys(['Enter'])" disabled>Enter</button>
        </div>
      </div>
      <div id="prompt-actions" class="prompt-actions" style="display:none">
        <div class="prompt-actions-label">
          <span>&#9889; Action needed</span>
          <button class="prompt-actions-dismiss" onclick="dismissPromptActions()" title="Dismiss (Esc)">&times;</button>
        </div>
        <div id="prompt-actions-buttons" class="prompt-actions-buttons"></div>
      </div>
      <div class="prompt-row">
        <textarea id="prompt-input" placeholder="Enter your prompt... (Ctrl+Enter to send)" disabled></textarea>
        <button class="send-btn" id="send-btn" onclick="sendPrompt()" disabled>Send</button>
      </div>
    </section>
  </div>

  <!-- Right: pane output preview -->
  <div class="right-panel">
    <div class="preview-header">
      <span>Pane Output</span>
      <span id="preview-target"></span>
      <label class="auto-scroll-label">
        <input type="checkbox" id="auto-scroll" checked>Auto-scroll
      </label>
    </div>
    <div class="preview-content" id="preview-content">
      <textarea id="preview-textarea" readonly style="display:none"></textarea>
      <div class="preview-empty" id="preview-empty">Select a pane to view output</div>
    </div>
  </div>
</div>


<script>
let selectedTarget = null;
let panes = [];
let pollTimer = null;
let promptBadgeShown = {};  // target -> true (tracks which panes already showed the badge animation)
let captureTimer = null;
let userScrolledAway = false;

// Detect user scroll: pause auto-scroll when scrolled away from bottom,
// resume when user scrolls back to the bottom.
document.getElementById('preview-textarea').addEventListener('scroll', function() {
  const el = this;
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 30;
  userScrolledAway = !atBottom;
});

async function loadPanes() {
  try {
    const res = await fetch('/api/panes');
    const data = await res.json();
    if (Array.isArray(data)) {
      panes = data;
      renderPanes();
    } else {
      document.getElementById('pane-grid').innerHTML =
        '<div class="empty-state">Error: ' + esc(data.error || JSON.stringify(data)) + '</div>';
    }
  } catch (e) {
    document.getElementById('pane-grid').innerHTML =
      '<div class="empty-state">Failed to load panes: ' + esc(String(e)) + '</div>';
  }
}

function renderPanes() {
  const grid = document.getElementById('pane-grid');
  if (panes.length === 0) {
    grid.innerHTML = '<div class="empty-state">No Claude Code panes found.</div>';
    return;
  }
  grid.innerHTML = panes.map(p => `
    <div class="pane-card ${p.target === selectedTarget ? 'selected' : ''}"
         onclick="selectPane('${p.target}')">
      <div class="target">${esc(p.target)}</div>
      <div class="cwd">${esc(p.cwd)}</div>
      <div class="meta">
        <span class="status-dot ${p.status}"></span>
        <span class="status-label">${p.status}</span>
        ${p.prompt_waiting ? `<span class="prompt-badge${!promptBadgeShown[p.target] ? ' animate' : ''}">INPUT</span>` : ''}
      </div>
      ${p.tokens ? `<div class="token-info">
        <span>${fmtTokens(p.tokens.input)}&#8593; ${fmtTokens(p.tokens.output)}&#8595;</span>
        <span>ctx ${p.tokens.ctx_pct.toFixed(0)}%</span>
        <div class="ctx-bar"><div class="ctx-bar-fill" style="width:${Math.min(p.tokens.ctx_pct, 100).toFixed(0)}%;background:${ctxColor(p.tokens.ctx_pct)}"></div></div>
      </div>` : ''}
    </div>
  `).join('');
  // Update badge animation tracking
  panes.forEach(p => {
    if (p.prompt_waiting) {
      promptBadgeShown[p.target] = true;
    } else {
      delete promptBadgeShown[p.target];  // reset so animation plays again next time
    }
  });
}

function selectPane(target) {
  selectedTarget = target;
  renderPanes();
  document.getElementById('selected-label').innerHTML =
    'Sending to: <strong>' + esc(target) + '</strong>';
  document.getElementById('preview-target').textContent = target;
  document.getElementById('prompt-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
  document.querySelectorAll('#quick-buttons .quick-btn').forEach(b => b.disabled = false);
  document.querySelectorAll('#manual-keys .quick-btn').forEach(b => b.disabled = false);
  document.getElementById('prompt-input').focus();
  loadCapture();
  startCapturePolling();
}

// --- Pane output capture ---
async function loadCapture() {
  if (!selectedTarget) return;
  try {
    const res = await fetch('/api/capture?target=' + encodeURIComponent(selectedTarget));
    const data = await res.json();
    const textarea = document.getElementById('preview-textarea');
    const empty = document.getElementById('preview-empty');
    if (data.ok) {
      textarea.style.display = '';
      empty.style.display = 'none';
      textarea.value = data.content;
      if (document.getElementById('auto-scroll').checked && !userScrolledAway) {
        textarea.scrollTop = textarea.scrollHeight;
      }
      // Prompt detection
      const lines = data.content.split('\n');
      const tail = lines.slice(-30);
      const detected = detectPrompt(tail);
      if (detected && (Date.now() - promptActionSentAt > 5000)) {
        renderPromptActions(detected.options, detected.title);
      } else {
        renderPromptActions(null);
      }
    } else {
      textarea.style.display = 'none';
      empty.style.display = '';
      empty.textContent = data.error;
    }
  } catch (e) {
    // Silently ignore fetch errors for capture
  }
}

function startCapturePolling() {
  if (captureTimer) clearInterval(captureTimer);
  captureTimer = setInterval(loadCapture, 2000);
}

// --- Mode / options ---
function getSelectedMode() {
  return document.querySelector('input[name="mode"]:checked').value;
}

function getSendEnter() {
  return document.getElementById('send-enter').checked;
}

const MODE_PREFIX_KEYS = {
  normal: null,
  plan: ["BTab"],
};

async function quickSend(command) {
  if (!selectedTarget) return;
  try {
    const res = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target: selectedTarget, prompt: command, send_enter: true })
    });
    const data = await res.json();
    const btn = document.getElementById('send-btn');
    if (data.ok) {
      flashBtn(btn, 'Sent!', 'sent');
    } else {
      flashBtn(btn, 'Failed', 'failed');
    }
  } catch (e) {
    const btn = document.getElementById('send-btn');
    flashBtn(btn, 'Error', 'failed');
  }
  setTimeout(loadCapture, 500);
}

async function sendPrompt() {
  const input = document.getElementById('prompt-input');
  const btn = document.getElementById('send-btn');
  const prompt = input.value.trim();

  if (!selectedTarget || !prompt) return;

  const mode = getSelectedMode();
  const sendEnter = getSendEnter();
  const prefixKeys = MODE_PREFIX_KEYS[mode] || null;

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    const res = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        target: selectedTarget,
        prompt: prompt,
        prefix_keys: prefixKeys,
        send_enter: sendEnter,
      })
    });
    const data = await res.json();
    if (data.ok) {
      input.value = '';
      flashBtn(btn, 'Sent!', 'sent');
    } else {
      flashBtn(btn, 'Failed', 'failed');
    }
  } catch (e) {
    flashBtn(btn, 'Error', 'failed');
  } finally {
    btn.disabled = false;
  }

  setTimeout(loadPanes, 1000);
  setTimeout(loadCapture, 500);
}

function flashBtn(btn, label, cls) {
  btn.textContent = label;
  btn.classList.add(cls);
  setTimeout(() => {
    btn.textContent = 'Send';
    btn.classList.remove(cls);
  }, 1500);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtTokens(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function ctxColor(pct) {
  if (pct >= 80) return 'var(--red)';
  if (pct >= 50) return 'var(--yellow)';
  return 'var(--green)';
}

// Ctrl+Enter / Cmd+Enter to send
document.getElementById('prompt-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    sendPrompt();
  }
});

// --- Prompt detection engine ---
let promptActionSentAt = 0;
let promptActionsDismissed = false;

/**
 * Detect interactive prompts from the tail of captured output.
 * Returns {title, options: [{num, label, selected, keys}]} or null.
 */
function detectPrompt(tailLines) {
  const tailText = tailLines.join('\n');

  // Primary signal 1: AskUserQuestion / completion menu
  const hasSelectFooter = tailText.includes('Enter to select');
  // Primary signal 2: Plan completion prompt
  const hasPlanFooter = tailText.includes('ctrl-g to edit in VS Code');
  // Primary signal 3: Tool permission (Allow + Deny)
  const hasPermission = /\bAllow\b/i.test(tailText) && /\bDeny\b/i.test(tailText);
  // Primary signal 4: Bash command / tool execution confirmation
  const hasBashConfirm = tailText.includes('Esc to cancel') && tailText.includes('Tab to amend');

  if (!hasSelectFooter && !hasPlanFooter && !hasPermission && !hasBashConfirm) return null;

  // Regex for numbered option lines (with or without ❯ selector)
  const optionRe = /^(\s*)(❯\s*)?\s*(\d+)\.\s+(.+)$/;

  // Find the anchor line: the line with ❯ + numbered option
  let anchorIdx = -1;
  for (let i = 0; i < tailLines.length; i++) {
    const m = tailLines[i].match(optionRe);
    if (m && m[2]) { // m[2] is the ❯ group
      anchorIdx = i;
      break;
    }
  }
  if (anchorIdx === -1) return null;

  // Scan BACKWARD from anchor to find the top of the option block.
  // Walk through option lines, description lines (deeply indented),
  // and blank lines. Stop at anything else (regular text, separators).
  let blockStart = anchorIdx;
  for (let i = anchorIdx - 1; i >= 0; i--) {
    const line = tailLines[i];
    if (optionRe.test(line)) {
      blockStart = i;                  // another option line → extend block
    } else if (line.trim() === '') {
      continue;                        // blank line → keep scanning
    } else if (/^\s{3,}\S/.test(line)) {
      continue;                        // description line (deeply indented) → keep scanning
    } else {
      break;                           // regular text / separator → block boundary
    }
  }

  // Forward limit: scan through separators (they are just visual dividers)
  const blockEnd = Math.min(tailLines.length - 1, anchorIdx + 30);

  // Extract options from blockStart..blockEnd (skip non-option lines)
  const options = [];
  let selectedNum = -1;  // track ❯ position by menu number (not filtered index)
  for (let i = blockStart; i <= blockEnd; i++) {
    const m = tailLines[i].match(optionRe);
    if (!m) continue;
    const isSelected = !!m[2];
    const num = parseInt(m[3]);
    const label = m[4].trim();
    if (isSelected) selectedNum = num;
    options.push({ num, label, selected: isSelected, keys: [] });
  }

  if (options.length === 0) return null;
  // Default selectedNum to first option if ❯ was on a filtered item
  if (selectedNum === -1) selectedNum = options[0].num;

  // Calculate key sequences using original menu numbers so navigation
  // is correct even when ❯ sits on a filtered option (e.g. "Type something")
  for (let i = 0; i < options.length; i++) {
    const delta = options[i].num - selectedNum;
    const keys = [];
    const dir = delta > 0 ? 'Down' : 'Up';
    for (let j = 0; j < Math.abs(delta); j++) keys.push(dir);
    keys.push('Enter');
    options[i].keys = keys;
  }

  // Build title
  let title = 'Action needed';
  if (hasBashConfirm) title = 'Command confirmation';
  else if (hasPlanFooter) title = 'Plan ready';
  else if (hasPermission) title = 'Permission needed';
  else if (hasSelectFooter) title = 'Select an option';

  return { title, options };
}

/**
 * Render prompt action buttons or hide the bar.
 */
function renderPromptActions(options, title) {
  const container = document.getElementById('prompt-actions');
  const btnContainer = document.getElementById('prompt-actions-buttons');

  if (!options || options.length === 0 || promptActionsDismissed) {
    container.style.display = 'none';
    return;
  }

  container.querySelector('.prompt-actions-label span').textContent = '\u26A1 ' + (title || 'Action needed');
  btnContainer.innerHTML = '';

  options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'prompt-action-btn';

    // Color-code by semantics
    if (/\b(yes|allow|ok|accept)\b/i.test(opt.label)) btn.classList.add('positive');
    if (/\b(no|deny|cancel|skip)\b/i.test(opt.label)) btn.classList.add('negative');

    const shortcutNum = idx + 1;
    btn.innerHTML = esc(opt.label) + ' <span class="shortcut">' + shortcutNum + '</span>';
    btn.onclick = () => sendPromptAction(opt.keys);
    btnContainer.appendChild(btn);
  });

  container.style.display = '';
  // Reset animation
  container.style.animation = 'none';
  container.offsetHeight; // trigger reflow
  container.style.animation = '';
  promptActionsDismissed = false;
}

function dismissPromptActions() {
  document.getElementById('prompt-actions').style.display = 'none';
  promptActionsDismissed = true;
  // Reset dismissed state on next capture change
  setTimeout(() => { promptActionsDismissed = false; }, 10000);
}

/**
 * Send raw key sequence to the selected pane via /api/send-keys.
 */
async function sendRawKeys(keys) {
  if (!selectedTarget || !keys || keys.length === 0) return;
  try {
    const res = await fetch('/api/send-keys', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target: selectedTarget, keys: keys })
    });
    const data = await res.json();
    if (data.ok) {
      flashBtn(document.getElementById('send-btn'), 'Sent!', 'sent');
    } else {
      flashBtn(document.getElementById('send-btn'), 'Failed', 'failed');
    }
  } catch (e) {
    flashBtn(document.getElementById('send-btn'), 'Error', 'failed');
  }
  setTimeout(loadCapture, 500);
  setTimeout(loadPanes, 1000);
}

/**
 * Send prompt action (arrow keys + Enter) and hide the action bar.
 */
async function sendPromptAction(keys) {
  promptActionSentAt = Date.now();
  document.getElementById('prompt-actions').style.display = 'none';
  await sendRawKeys(keys);
}

// Keyboard shortcuts: number keys 1-9 to select prompt action options
// Only active when prompt actions are visible and textarea is not focused
document.addEventListener('keydown', function(e) {
  const actionsBar = document.getElementById('prompt-actions');
  if (actionsBar.style.display === 'none') return;
  if (document.activeElement === document.getElementById('prompt-input')) return;

  if (e.key === 'Escape') {
    e.preventDefault();
    dismissPromptActions();
    return;
  }

  const num = parseInt(e.key);
  if (num >= 1 && num <= 9) {
    const buttons = document.querySelectorAll('#prompt-actions-buttons .prompt-action-btn');
    if (num <= buttons.length) {
      e.preventDefault();
      buttons[num - 1].click();
    }
  }
});

// Initial load + polling
loadPanes();
pollTimer = setInterval(loadPanes, 5000);
</script>
