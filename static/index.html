<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#161b22">
<title>ccl_tmux_sender</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <h1>ccl_tmux_sender</h1>
  <div id="rate-limits" class="rate-limits"></div>
  <button id="pwa-install-btn" class="install-btn" style="display:none">Install App</button>
  <button id="touch-mode-btn" class="touch-mode-btn" onclick="toggleTouchMode()">Touch</button>
  <button class="refresh-btn" onclick="loadPanes()">Refresh</button>
</header>

<div class="main">
  <!-- Left: pane selection + prompt input -->
  <div class="left-panel">
    <section class="panes-section">
      <h2>Panes</h2>
      <div id="pane-grid" class="pane-grid">
        <div class="empty-state">Loading...</div>
      </div>
    </section>

    <div class="v-resizer" id="v-resizer"></div>

    <section class="prompt-section">
      <div class="selected-target" id="selected-label">Select a pane above</div>
      <div class="options-row">
        <div class="option-group">
          <span class="option-group-label">Mode</span>
          <label class="radio-label"><input type="radio" name="mode" value="normal" checked>Normal</label>
          <label class="radio-label"><input type="radio" name="mode" value="plan">Plan</label>
        </div>
        <div class="options-divider"></div>
        <div class="option-group">
          <label class="checkbox-label"><input type="checkbox" id="send-enter" checked>Send Enter</label>
        </div>
      </div>
      <div class="quick-buttons" id="quick-buttons">
        <button class="quick-btn" onclick="quickSend('/clear')" disabled>/clear</button>
        <button class="quick-btn" onclick="quickSend('/compact')" disabled>/compact</button>
        <div class="options-divider"></div>
        <div class="manual-keys" id="manual-keys">
          <!-- button class="quick-btn" onclick="sendRawKeys(['y'])" disabled>y</button>
          <button class="quick-btn" onclick="sendRawKeys(['n'])" disabled>n</button -->
          <button class="quick-btn" onclick="sendRawKeys(['Escape'])" disabled>Esc</button>
          <button class="quick-btn" onclick="sendRawKeys(['Up'])" disabled>&uarr;</button>
          <button class="quick-btn" onclick="sendRawKeys(['Down'])" disabled>&darr;</button>
          <button class="quick-btn" onclick="sendRawKeys(['Enter'])" disabled>Enter</button>
        </div>
        <div id="preset-buttons" class="preset-buttons"></div>
        <div class="custom-send-row" id="custom-send-row">
          <input type="text" id="custom-send-input" class="custom-send-input"
                 placeholder="One-shot send..." disabled />
          <button class="quick-btn custom-send-btn" id="custom-send-btn"
                  onclick="customSend()" disabled>Send</button>
          <button class="quick-btn custom-save-btn" id="custom-save-btn"
                  onclick="savePreset()" disabled title="Save as preset button">+</button>
        </div>
      </div>
      <div id="prompt-actions" class="prompt-actions" style="display:none">
        <div class="prompt-actions-label">
          <span>&#9889; Action needed</span>
          <button class="prompt-actions-dismiss" onclick="dismissPromptActions()" title="Dismiss (Esc)">&times;</button>
        </div>
        <div id="prompt-actions-buttons" class="prompt-actions-buttons"></div>
      </div>
      <div class="prompt-row">
        <textarea id="prompt-input" placeholder="Enter your prompt... (Ctrl+Enter to send)" disabled></textarea>
        <button class="send-btn" id="send-btn" onclick="sendPrompt()" disabled>Send</button>
      </div>
    </section>
  </div>

  <!-- Right: pane output preview -->
  <div class="right-panel">
    <div class="preview-header">
      <span>Pane Output</span>
      <span id="preview-target"></span>
      <label class="auto-scroll-label">
        <input type="checkbox" id="auto-scroll" checked>Auto-scroll
      </label>
    </div>
    <div class="preview-content" id="preview-content">
      <textarea id="preview-textarea" readonly style="display:none"></textarea>
      <div class="preview-empty" id="preview-empty">Select a pane to view output</div>
      <button id="scroll-to-bottom-btn" class="scroll-to-bottom-btn" style="display:none" onclick="scrollToBottom()">&#x25BC;</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
